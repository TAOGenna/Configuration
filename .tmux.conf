### ────────────────────────────────
###  Terminal and Input Behavior
### ────────────────────────────────

# Enable full 256-color and truecolor support.
# This ensures Vim and your terminal show accurate colors.
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Shorten the delay after pressing ESC.
# This makes exiting Vim's insert mode feel snappier inside tmux.
# Neovim users often set this lower, but for Vim 25–50 ms is safe.
set -sg escape-time 25


### ────────────────────────────────
###  Prefix Key (command trigger)
### ────────────────────────────────

# Change the tmux prefix from Ctrl-b → Ctrl-a (easier to reach on HHKB).
# Every tmux command starts with this prefix.
set -g prefix C-a
unbind C-b
bind C-a send-prefix  # Allows sending literal Ctrl-a to nested tmux sessions.


### ────────────────────────────────
###  Pane Splitting and Navigation
### ────────────────────────────────

# Splits:
#   Ctrl-a | → vertical split
#   Ctrl-a - → horizontal split
bind - split-window -h
bind \ split-window -v

# Navigate panes Vim-style (Ctrl-a h/j/k/l)
bind -r h select-pane -L
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R

# Resize panes with Alt + h/j/k/l
#   M = Meta (Alt key on HHKB)
bind -r M-h resize-pane -L 3
bind -r M-j resize-pane -D 3
bind -r M-k resize-pane -U 3
bind -r M-l resize-pane -R 3


### ────────────────────────────────
###  Mouse and Copy Mode
### ────────────────────────────────

# Enable mouse: you can resize panes, click to focus, and scroll.
# It’s optional, but convenient on macOS.
set -g mouse on

# Use Vim-style keybindings for copy mode (instead of emacs-style).
set-window-option -g mode-keys vi

# Inside copy mode:
#   v → start selection
#   y → copy selection
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi y send -X copy-selection

# Keep copy mode active after mouse drag, so you can fine-tune selection.
unbind -T copy-mode-vi MouseDragEnd1Pane


### ────────────────────────────────
###  Status Bar (GeoHotz-style minimal look)
### ────────────────────────────────

# Position it at the bottom (explicit).
set -g status-position bottom

# Simple dark background and subtle foreground colors.
set -g status-bg colour234
set -g status-fg colour137

# No text on left side.
set -g status-left ''

# Date and time on the right.
set -g status-right '#[fg=colour233,bg=colour241,bold] %d/%m #[fg=colour233,bg=colour245,bold] %H:%M:%S '
set -g status-right-length 50
set -g status-left-length 20


### ────────────────────────────────
###  Plugin Management (TPM)
### ────────────────────────────────

# Tmux Plugin Manager — install by running:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Once installed:
#   Ctrl-a + I → install plugins
#   Ctrl-a + U → update plugins
set -g @plugin 'tmux-plugins/tpm'

# Vim-Tmux Navigator:
# Seamlessly move between Vim splits and tmux panes with Ctrl-h/j/k/l
# (requires vim plugin `christoomey/vim-tmux-navigator` installed separately)
set -g @plugin 'christoomey/vim-tmux-navigator'

# Tmux Resurrect:
# Saves your tmux sessions (windows, panes, commands) so you can restore them later.
set -g @plugin 'tmux-plugins/tmux-resurrect'

# Tmux Continuum:
# Auto-saves sessions every 15 minutes and restores them on launch.
set -g @plugin 'tmux-plugins/tmux-continuum'

# Save pane contents when resurrect runs.
set -g @resurrect-capture-pane-contents 'on'

# Automatically restore last session on tmux startup.
set -g @continuum-restore 'on'

# TPM initialization (must be last).
run '~/.tmux/plugins/tpm/tpm'
